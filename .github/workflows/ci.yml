name: ci

on:
  push:
  pull_request:

jobs:
  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Download small GGUF for integration
        run: |
          ./tests/model_downloader.sh

      - name: Configure
        run: |
          cmake --preset dev

      - name: Build
        run: |
          cmake --build --preset dev -j

      - name: Test
        run: |
          ctest --preset dev -j

  bench-features-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Download small GGUF for benches
        run: |
          ./tests/model_downloader.sh
          ./tests/model_downloader.sh --preset embed-minilm-q2k

      - name: Configure (release-with-tests)
        run: |
          cmake --preset release-with-tests

      - name: Build (release-with-tests)
        run: |
          cmake --build --preset release-with-tests -j

      - name: Run canonical feature surface bench (CPU)
        run: |
          ./scripts/run_ci_bench_features.sh --preset release-with-tests --backend cpu --iters 50 --tokens 32 \
            --out benchmarks/results/ci-features-linux.txt

      - name: Upload bench log
        uses: actions/upload-artifact@v4
        with:
          name: bench-features-linux
          path: |
            benchmarks/results/ci-features-linux.txt

  bench-features-cuda-best-effort:
    # Non-blocking until v0.2: this is expected to skip on GitHub-hosted runners.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Detect CUDA runtime
        id: cuda
        shell: bash
        run: |
          if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -L >/dev/null 2>&1; then
            echo "has_gpu=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gpu=false" >> "$GITHUB_OUTPUT"
          fi
          if command -v nvcc >/dev/null 2>&1; then
            echo "has_nvcc=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_nvcc=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        if: steps.cuda.outputs.has_gpu == 'true' && steps.cuda.outputs.has_nvcc == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Download small GGUF for benches
        if: steps.cuda.outputs.has_gpu == 'true' && steps.cuda.outputs.has_nvcc == 'true'
        run: |
          ./tests/model_downloader.sh

      - name: Configure (dev-cuda)
        if: steps.cuda.outputs.has_gpu == 'true' && steps.cuda.outputs.has_nvcc == 'true'
        run: |
          cmake --preset dev-cuda

      - name: Build (dev-cuda)
        if: steps.cuda.outputs.has_gpu == 'true' && steps.cuda.outputs.has_nvcc == 'true'
        run: |
          cmake --build --preset dev-cuda -j

      - name: Run canonical feature surface bench (CUDA)
        if: steps.cuda.outputs.has_gpu == 'true' && steps.cuda.outputs.has_nvcc == 'true'
        run: |
          ASTRAL_TEST_CUDA_E2E=1 ./scripts/run_ci_bench_features.sh --preset dev-cuda --backend cuda --gpu-layers 32 \
            --iters 25 --tokens 32 --out benchmarks/results/ci-features-cuda.txt

      - name: Upload bench log
        if: steps.cuda.outputs.has_gpu == 'true' && steps.cuda.outputs.has_nvcc == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bench-features-cuda-best-effort
          path: |
            benchmarks/results/ci-features-cuda.txt

  macos-tests:
    runs-on: macos-latest
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps
        run: |
          brew install ninja || true

      - name: Download small GGUF for integration
        run: |
          ./tests/model_downloader.sh

      - name: Configure
        run: |
          cmake --preset dev

      - name: Build
        run: |
          cmake --build --preset dev -j

      - name: Test
        run: |
          ctest --preset dev -j

  windows-tests:
    runs-on: windows-latest
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps
        run: |
          choco install -y ninja

      - name: Download small GGUF for integration
        shell: bash
        run: |
          ./tests/model_downloader.sh

      - name: Configure
        run: |
          cmake --preset dev

      - name: Build
        run: |
          cmake --build --preset dev -j

      - name: Test
        run: |
          ctest --preset dev -j

  linux-prof-tracy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Check Tracy submodule
        id: tracy
        run: |
          if [ -f external/tracy/public/TracyClient.cpp ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure (dev-prof)
        if: steps.tracy.outputs.enabled == 'true'
        run: |
          cmake --preset dev-prof

      - name: Build (dev-prof)
        if: steps.tracy.outputs.enabled == 'true'
        run: |
          cmake --build --preset dev-prof -j

      - name: Test (dev-prof)
        if: steps.tracy.outputs.enabled == 'true'
        run: |
          ctest --preset dev-prof -j

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install cross toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-aarch64-linux-gnu g++-arm-linux-gnueabihf qemu-user

      - name: Configure arm64 (examples)
        run: |
          cmake --preset embedded-arm64-cross

      - name: Build arm64 (examples)
        run: |
          cmake --build --preset embedded-arm64-cross -j

      - name: QEMU smoke (arm64, mock backend)
        run: |
          BIN="build/embedded-arm64/examples/embedded/astral_embedded_cli"
          test -x "${BIN}"
          qemu-aarch64 -L /usr/aarch64-linux-gnu "${BIN}" --backend mock --prompt "hi" --tokens 16 --sink none --reset
          BIN2="build/embedded-arm64/examples/embedded/astral_concurrency_contract"
          test -x "${BIN2}"
          qemu-aarch64 -L /usr/aarch64-linux-gnu "${BIN2}"

      - name: Configure arm64 (gates)
        run: |
          cmake --preset embedded-arm64-ci

      - name: Build arm64 (gates)
        run: |
          cmake --build --preset embedded-arm64-ci -j

      - name: QEMU gates (arm64, mock)
        run: |
          BIN="build/embedded-arm64-ci/tests/gate_allocations"
          test -x "${BIN}"
          qemu-aarch64 -L /usr/aarch64-linux-gnu "${BIN}"
          BIN2="build/embedded-arm64-ci/tests/gate_io_syscalls"
          test -x "${BIN2}"
          qemu-aarch64 -L /usr/aarch64-linux-gnu "${BIN2}"

      - name: Configure armv7 (examples)
        run: |
          cmake --preset embedded-armv7-cross

      - name: Build armv7 (examples)
        run: |
          cmake --build --preset embedded-armv7-cross -j

      - name: QEMU smoke (armv7, mock backend)
        run: |
          BIN="build/embedded-armv7/examples/embedded/astral_embedded_cli"
          test -x "${BIN}"
          qemu-arm -L /usr/arm-linux-gnueabihf "${BIN}" --backend mock --prompt "hi" --tokens 16 --sink none --reset
          BIN2="build/embedded-armv7/examples/embedded/astral_concurrency_contract"
          test -x "${BIN2}"
          qemu-arm -L /usr/arm-linux-gnueabihf "${BIN2}"

      - name: Configure armv7 (gates)
        run: |
          cmake --preset embedded-armv7-ci

      - name: Build armv7 (gates)
        run: |
          cmake --build --preset embedded-armv7-ci -j

      - name: QEMU gates (armv7, mock)
        run: |
          BIN="build/embedded-armv7-ci/tests/gate_allocations"
          test -x "${BIN}"
          qemu-arm -L /usr/arm-linux-gnueabihf "${BIN}"
          BIN2="build/embedded-armv7-ci/tests/gate_io_syscalls"
          test -x "${BIN2}"
          qemu-arm -L /usr/arm-linux-gnueabihf "${BIN2}"

  embedded-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure (embedded-x86_64)
        run: |
          cmake --preset embedded-x86_64

      - name: Build (embedded-x86_64)
        run: |
          cmake --build --preset embedded-x86_64 -j

  unity-plugin-artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja || true

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y ninja

      - name: Configure (unity-plugin)
        run: |
          cmake --preset unity-plugin

      - name: Build (unity-plugin)
        run: |
          cmake --build --preset unity-plugin -j

      - name: Upload Unity plugin native binaries
        uses: actions/upload-artifact@v4
        with:
          name: unity-native-${{ runner.os }}
          path: |
            plugins/unity/Runtime/Plugins/

  unity-android-artifacts:
    runs-on: ubuntu-latest
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          # r27c = 27.2.12479018; matches UE 5.7 Android requirements.
          ndk-version: 27.2.12479018

      - name: Export ANDROID_NDK_HOME
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> "$GITHUB_ENV"

      - name: Configure (unity-plugin-android-arm64)
        run: |
          cmake --preset unity-plugin-android-arm64

      - name: Build (unity-plugin-android-arm64)
        run: |
          cmake --build --preset unity-plugin-android-arm64 -j

      - name: Upload Unity Android native binaries
        uses: actions/upload-artifact@v4
        with:
          name: unity-android-arm64
          path: |
            plugins/unity/Runtime/Plugins/Android/

  unity-ios-artifacts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Configure (unity-plugin-ios-arm64)
        run: |
          cmake --preset unity-plugin-ios-arm64

      - name: Build (unity-plugin-ios-arm64)
        run: |
          cmake --build --preset unity-plugin-ios-arm64 -j

      - name: Upload Unity iOS native binaries
        uses: actions/upload-artifact@v4
        with:
          name: unity-ios-arm64
          path: |
            plugins/unity/Runtime/Plugins/iOS/

  unreal-plugin-artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja || true

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y ninja

      - name: Configure (unreal-plugin)
        run: |
          cmake --preset unreal-plugin

      - name: Build (unreal-plugin)
        run: |
          cmake --build --preset unreal-plugin -j

      - name: Upload Unreal plugin ThirdParty artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unreal-thirdparty-${{ runner.os }}
          path: |
            plugins/unreal/AstralRT/Source/ThirdParty/AstralCore/

  unreal-android-artifacts:
    runs-on: ubuntu-latest
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          # r27c = 27.2.12479018; matches UE 5.7 Android requirements.
          ndk-version: 27.2.12479018

      - name: Export ANDROID_NDK_HOME
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}" >> "$GITHUB_ENV"

      - name: Configure (unreal-plugin-android-arm64)
        run: |
          cmake --preset unreal-plugin-android-arm64

      - name: Build (unreal-plugin-android-arm64)
        run: |
          cmake --build --preset unreal-plugin-android-arm64 -j

      - name: Upload Unreal Android ThirdParty artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unreal-android-arm64
          path: |
            plugins/unreal/AstralRT/Source/ThirdParty/AstralCore/include/
            plugins/unreal/AstralRT/Source/ThirdParty/AstralCore/lib/Android/arm64-v8a/

  unreal-ios-artifacts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Configure (unreal-plugin-ios-arm64)
        run: |
          cmake --preset unreal-plugin-ios-arm64

      - name: Build (unreal-plugin-ios-arm64)
        run: |
          cmake --build --preset unreal-plugin-ios-arm64 -j

      - name: Upload Unreal iOS ThirdParty artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unreal-ios-arm64
          path: |
            plugins/unreal/AstralRT/Source/ThirdParty/AstralCore/include/
            plugins/unreal/AstralRT/Source/ThirdParty/AstralCore/lib/IOS/

  release-desktop-artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja || true

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y ninja

      - name: Download small GGUF for integration
        shell: bash
        run: |
          ./tests/model_downloader.sh

      - name: Build + test + package (release-with-tests)
        shell: bash
        run: |
          chmod +x ./scripts/package_release.sh
          ./scripts/package_release.sh --preset release-with-tests --unity --unreal

      - name: Upload v0.1 desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v0.1-desktop-${{ runner.os }}
          path: |
            dist/*.zip
            dist/abi-layout.json
            dist/checksums.sha256
            dist/dependency-manifest.json
            dist/release-evidence.json
